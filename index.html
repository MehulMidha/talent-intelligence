<style>
:root{--royal:#1E40AF;--royal-d:#16308a;--royal-l:#3B5BD6;--tint:#EEF2FC;--tint2:#E1E8FB;--ink:#0F1B33;--ink2:#41506A;--mut:#7A879B;--line:#E4E9F2;--line2:#D4DCEA;--card:#FFFFFF;--bg:#F4F6FB;--teal:#0E9384;--amber:#C77C12;--pos:#1F8A4C;--warn:#B45309;--bad:#BB2E3A;--posbg:#E8F4ED;--warnbg:#FBF0DD;--sh:0 1px 2px rgba(15,27,51,.05),0 6px 18px rgba(15,27,51,.06);}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:"Plus Jakarta Sans",system-ui,sans-serif;font-size:15px;line-height:1.55}
.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--royal),var(--royal-d));color:#fff;box-shadow:0 2px 12px rgba(15,27,51,.12)}
.topwrap{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:0 28px;height:64px}
.logo{font-weight:800;font-size:17px;line-height:1.15;white-space:nowrap}.logo .ti{font-weight:500;opacity:.85}.logo .demo{display:block;font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#cdd7f5;margin-top:3px}
.tabs{display:flex;gap:2px;flex-wrap:nowrap;overflow-x:auto}
.tabs a{color:#D7DEF6;text-decoration:none;font-size:13.5px;font-weight:600;padding:7px 10px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap}
.tabs a:hover{background:rgba(255,255,255,.12);color:#fff}.tabs a.on{background:#fff;color:var(--royal)}

.wrap{max-width:1180px;margin:0 auto;padding:30px 28px 70px}
.eyebrow{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--royal-l);font-weight:700}
h1{font-size:27px;font-weight:800;margin:5px 0 6px;letter-spacing:-.3px}h2{font-size:18px;font-weight:700;margin:24px 0 10px}
.lead{color:var(--ink2);max-width:720px;margin:0 0 18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--sh);margin-bottom:18px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:16px 0}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--royal)}
.kpi .v{font-size:30px;font-weight:800;line-height:1;color:var(--royal)}.kpi .l{font-size:12.5px;color:var(--mut);margin-top:6px}
label.fld{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);font-weight:600;margin:0 0 6px}
select,textarea,input{font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line2);border-radius:10px;padding:10px 13px;width:100%}
select:focus,textarea:focus,input:focus{outline:2px solid var(--royal-l);border-color:var(--royal)}
textarea{min-height:150px;resize:vertical;line-height:1.5}
.search{position:relative}.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}.search input{padding-left:36px}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--royal);color:#fff;border:none;border-radius:10px;padding:10px 17px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn:hover{background:var(--royal-d)}.btn.alt{background:#fff;color:var(--royal);border:1.5px solid var(--line2)}.btn.alt:hover{border-color:var(--royal-l);background:var(--tint)}.btn.sm{padding:7px 13px;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);font-weight:700;padding:9px 11px;border-bottom:2px solid var(--line)}
td{padding:11px 11px;border-bottom:1px solid var(--line);vertical-align:middle}tr:last-child td{border-bottom:none}tbody tr:hover{background:var(--tint)}
.bar{height:9px;border-radius:6px;background:var(--tint2);position:relative;overflow:hidden;min-width:60px}.bar>i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;display:block}
.dual{display:flex;flex-direction:column;gap:4px}
.pill{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 11px;border-radius:20px}
.pill.hi{background:var(--posbg);color:var(--pos)}.pill.med{background:var(--warnbg);color:var(--warn)}.pill.lo{background:#EEF1F6;color:var(--mut)}
.pill.drv{background:#E3E9FF;color:var(--royal)}.pill.core{background:var(--tint);color:var(--royal-l)}.pill.gray{background:#EEF1F6;color:var(--ink2)}
.prov{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin:1px 2px 1px 0}
.prov.on{background:var(--posbg);color:var(--pos)}.prov.off{background:#F0F2F6;color:#AEB6C2}
.verified{font-size:10.5px;font-weight:800;color:var(--royal);background:#E3E9FF;padding:2px 8px;border-radius:6px}
.num{font-family:"IBM Plex Mono",monospace;font-weight:500}.muted{color:var(--mut)}.small{font-size:12.5px}
.note{background:var(--tint);border-left:3px solid var(--royal);border-radius:0 9px 9px 0;padding:12px 15px;font-size:13px;color:var(--ink2);margin:14px 0}
.banner{background:#EAF0FF;border:1px solid var(--tint2);border-left:4px solid var(--royal);border-radius:0 10px 10px 0;padding:13px 16px;font-size:13.5px;color:var(--ink2);margin:0 0 16px}
.okbox{background:var(--posbg);border-left:3px solid var(--pos);border-radius:0 9px 9px 0;padding:12px 15px;font-size:13px;color:#155e34;margin:12px 0}
.valbadge{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;padding:6px 12px;border-radius:9px;margin:4px 0 10px}
.valbadge.ok{background:var(--posbg);color:var(--pos)}.valbadge.no{background:var(--warnbg);color:var(--warn)}.valbadge.lim{background:#EEF1F6;color:var(--ink2)}
.evi{border-left:3px solid var(--line2);padding:6px 0 6px 13px;margin:7px 0;font-size:13px;color:var(--ink2);font-style:italic}.evi.has{border-color:var(--pos)}.evi.miss{border-color:var(--amber);font-style:normal}
.cards4{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:8px}
.mod{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--sh);cursor:pointer;transition:.18s}
.mod:hover{transform:translateY(-3px);border-color:var(--royal-l);box-shadow:0 8px 26px rgba(30,64,175,.14)}
.mod .ic{width:42px;height:42px;border-radius:11px;background:var(--tint);display:flex;align-items:center;justify-content:center;color:var(--royal);font-weight:800;font-size:18px;margin-bottom:12px}
.mod h3{margin:0 0 5px;font-size:16px;font-weight:700}.mod p{margin:0;font-size:13px;color:var(--ink2)}
.plan{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:10px}
.stage{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
.stage .h{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13.5px;margin-bottom:7px}
.stage .h .n{width:24px;height:24px;border-radius:7px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px}
.stage p{margin:0;font-size:13px;color:var(--ink2);line-height:1.5}
.planhead{display:flex;align-items:center;gap:9px;font-weight:700;margin:16px 0 2px}.spark{color:var(--royal-l)}
.toggle{display:inline-flex;background:var(--tint);border-radius:10px;padding:3px;margin-bottom:14px}
.toggle button{border:none;background:none;padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer}.toggle button.on{background:#fff;color:var(--royal);box-shadow:var(--sh)}
.chatlog{display:flex;flex-direction:column;gap:12px;margin:10px 0 16px;max-height:460px;overflow:auto;padding:4px}
.msg{max-width:88%;padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.5}
.msg.u{align-self:flex-end;background:var(--royal);color:#fff;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.a b{color:var(--royal)}.msg.a .num{color:var(--ink)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.chip{font-size:12.5px;background:#fff;border:1px solid var(--line2);border-radius:20px;padding:6px 13px;cursor:pointer;color:var(--royal-l);font-weight:600}.chip:hover{background:var(--tint);border-color:var(--royal-l)}
.chatbar{display:flex;gap:10px}.chatbar input{flex:1}
.skilltag{display:inline-block;font-size:11.5px;background:var(--tint);border:1px solid var(--line2);border-radius:7px;padding:2px 9px;margin:2px 2px 2px 0;white-space:nowrap}
.skilltag.dur{border-color:#8fc7be;color:var(--teal);background:#E7F4F2}.skilltag.exp{border-color:#e3bd80;color:var(--amber);background:#FBF1DD}
.foot{max-width:1180px;margin:0 auto;padding:0 28px 40px;color:var(--mut);font-size:12px}
.fade{animation:fade .3s ease}@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@media(max-width:880px){.topwrap{height:auto;flex-direction:column;align-items:flex-start;padding:10px 18px;gap:8px}.wrap{padding:22px 18px 60px}}
.ov{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow:auto}
.modal{background:#fff;border-radius:14px;max-width:560px;width:100%;padding:22px 24px;box-shadow:0 24px 60px rgba(0,0,0,.28)}
.modal h2{margin:0 0 2px;font-size:20px}
.modal .row{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0}
.modal label{display:block;font-size:11.5px;font-weight:600;color:var(--mut);margin-bottom:3px}
.modal input,.modal select{width:100%;padding:7px 9px;border:1px solid var(--line2);border-radius:8px;font:inherit;background:#fff}
.skedit{max-height:200px;overflow:auto;border:1px solid var(--line2);border-radius:8px;padding:8px}
.skrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 2px}
.skrow input{width:60px;padding:4px 6px}
.prov.edit{cursor:pointer;outline:1px dashed var(--line2)}

 if(hi.length<8||rest.length<8)res={ok:null,t:"Limited sample — treat profile as indicative"};
 else{const sb=a=>a.slice().sort((x,y)=>x.i<y.i?-1:1);const sh=sb(hi),sr=sb(rest);
  const trH=sh.filter((_,i)=>i%3!==0),teH=sh.filter((_,i)=>i%3===0),trR=sr.filter((_,i)=>i%3!==0),teR=sr.filter((_,i)=>i%3===0);

  const top=tr.slice(0,4).map(x=>x.sid);let agree=0;

function swotFor(f){

 var SCARCE={"DNA-ML":1,"DNA-ENG":1,"CLD-SRE":1,"CLD-IAC":1,"IT-SEC":1,"ENG-ARCH":1};
 var crit=Object.keys(roleReq[f]||{}).filter(function(sid){var c=(roleReq[f][sid]||{}).crit||"";return c.indexOf("Core")>=0||c.indexOf("driver")>=0;});
 var strong=[],weak=[],thin=[],scarce=[],durBuild=[];
 crit.forEach(function(sid){var rr=roleReq[f][sid]||{};var tgt=rr.reqIC||3;
  var have=pop.map(function(e){return e.sk[sid];}).filter(function(v){return v!=null;});var avg=have.length?mean(have):0;
  var pipeline=pop.filter(function(e){return (e.sk[sid]||0)>=tgt-1;}).length;var nm=(skills[sid]||{}).n||sid;
  if(avg>=tgt+0.3)strong.push(nm);if(avg<tgt)weak.push(nm);if(pipeline<N*0.4)thin.push(nm);
  if(SCARCE[sid])scarce.push(nm);if(isDurable(sid)&&avg>=tgt-0.5)durBuild.push(nm);});
 var borrowReady=emps.filter(function(e){return e.f!==f&&e.p!=="NR";}).filter(function(e){return readyBand(matchScore(e,f).gaps)<3;}).length;
 var hipo=pop.filter(function(e){return e.p===5&&e.li<=3;}).length;
 var S=[],W=[],O=[],T=[];
 if(strong.length)S.push("Deep, proven capability in "+list(strong.slice(0,3)));

 if(engAvg<68)W.push("Engagement is lagging (avg "+engAvg+"), a drag on performance and retention");
 if(!W.length)W.push("No major internal weaknesses surfaced across the critical skills");
 if(borrowReady>0)O.push(borrowReady+" people in other functions are within reach of this family \u2014 an internal pipeline to borrow or redeploy");
 if(durBuild.length)O.push("Most critical skills are durable and buildable in-house \u2014 develop rather than buy");
 if(hipo>0)O.push(hipo+" high-potential junior people ready to accelerate into bigger roles");
 if(!O.length)O.push("Cross-training and internal mobility can widen the bench");
 if(scarce.length)T.push("Reliance on scarce, hard-to-hire skills ("+list(scarce.slice(0,3))+") where the market is tight and costly");
 if(hiRisk.length)T.push(hiRisk.length+" of your high performers show elevated flight risk \u2014 losing them would hit capability hard");
 else if(atRisk.length/N>=0.2)T.push(Math.round(atRisk.length/N*100)+"% of the team is at elevated attrition risk");
 if(!T.length)T.push("No acute attrition or market threats detected");

V.planning=()=>{
 var f=state.swpfam||"Engineering";var g=state.swpGrowth!=null?state.swpGrowth:0.25;var tight=state.swpMarket==="tight";
 var pop=emps.filter(function(e){return e.f===f;});var N=pop.length;var target=Math.round(N*(1+g));
 var lr={High:0.30,Medium:0.12,Low:0.05};var expLoss=Math.round(pop.reduce(function(s,e){return s+(lr[e.fr]||0.1);},0));var retained=Math.max(0,N-expLoss);var keep=N?retained/N:1;
 var SCARCE={"DNA-ML":1,"DNA-ENG":1,"CLD-SRE":1,"CLD-IAC":1,"IT-SEC":1,"ENG-ARCH":1};
 var borrowPool=emps.filter(function(e){return e.f!==f&&e.p!=="NR";});
 var critSids=Object.keys(roleReq[f]||{}).filter(function(sid){var c=(roleReq[f][sid]||{}).crit||"";return c.indexOf("Core")>=0||c.indexOf("driver")>=0;});
 var rows=critSids.map(function(sid){
   var rr=roleReq[f][sid]||{};var tgt=rr.reqIC||3;
   var holders=pop.filter(function(e){return e.sk[sid]!=null;}).length||N;
   var need=Math.max(1,Math.round(holders*(1+g)));
   var have=Math.round(holders*keep);
   var gap=Math.max(0,need-have);
   var pipeline=pop.filter(function(e){return (e.sk[sid]||0)>=tgt-1;}).length;
   var durable=isDurable(sid);var scarce=!!SCARCE[sid];
   var borrowN=borrowPool.filter(function(e){return (e.sk[sid]||0)>=tgt;}).length;
   var strat,why;var small=Math.max(1,Math.round(need*0.10));
   if(gap<=small){strat="Covered";why=have+" people retained against a need for "+need+" \u2014 covered once normal attrition is backfilled; keep skills current.";}
   else if(scarce){
     if(tight){if(borrowN>=2){strat="Borrow";why="a scarce skill and the hiring market is tight \u2014 redeploy from the "+borrowN+" people in other functions who already have it rather than competing for costly external hires.";}else{strat="Build";why="a scarce skill in a tight market, where hiring is slow and expensive \u2014 start an internal pipeline now from your "+pipeline+" near-ready people.";}}
     else{strat="Buy";why="a scarce specialist skill \u2014 buy senior expertise externally to add ~"+gap+" people (expect a long lead time), and build depth behind it.";}
   }
   else if(pipeline>=gap){strat="Build";why="develop and promote from your "+pipeline+"-strong internal bench to add ~"+gap+" people and backfill junior roles \u2014 the fastest, cheapest lever for a buildable skill.";}
   else if(borrowN>=2){strat="Borrow";why="your bench covers part of the "+gap+"-person need; move in some of the "+borrowN+" people from other functions who already have this skill.";}
